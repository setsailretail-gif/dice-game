<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Bitcoin Craps</title>
    <!-- Tailwind CSS Engine -->
   <a href="http://dnsexit.com"><img src="http://dnsexit.com/images/dns.gif" border=0></a>
    <script src="jsdelivr.net"></script>
    <style>
        .dice-box { perspective: 1000px; }
        .cube {
            position: relative; width: 70px; height: 70px;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        /* Glossy glare effect over pitch black dice faces */
        .face {
            position: absolute; width: 70px; height: 70px;
            background: linear-gradient(135deg, #1e293b 0%, #020617 40%, #0f172a 100%);
            border: 2px solid #334155; border-radius: 14px;
            display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 8px; box-sizing: border-box;
            box-shadow: inset 2px 2px 4px rgba(255,255,255,0.15), 0 8px 12px rgba(0,0,0,0.6);
        }
        /* Vivid neon red dot matrix styling */
        .dot { 
            display: block; 
            background: radial-gradient(circle, #ff4545 20%, #cc0000 80%); 
            border-radius: 50%; width: 12px; height: 12px; margin: auto; 
            box-shadow: 0 0 8px #ff1a1a, inset 0 1px 2px rgba(0,0,0,0.6);
        }
        /* Geometric transforms mapping faces */
        .f1 { transform: rotateY(0deg) translateZ(35px); }
        .f6 { transform: rotateY(180deg) translateZ(35px); }
        .f2 { transform: rotateY(90deg) translateZ(35px); }
        .f5 { transform: rotateY(-90deg) translateZ(35px); }
        .f3 { transform: rotateX(90deg) translateZ(35px); }
        .f4 { transform: rotateX(-90deg) translateZ(35px); }

        .f1 .dot:nth-child(1) { grid-area: 2/2; }
        .f2 .dot:nth-child(1) { grid-area: 1/1; } .f2 .dot:nth-child(2) { grid-area: 3/3; }
        .f3 .dot:nth-child(1) { grid-area: 1/1; } .f3 .dot:nth-child(2) { grid-area: 2/2; } .f3 .dot:nth-child(3) { grid-area: 3/3; }
        .f4 .dot:nth-child(1) { grid-area: 1/1; } .f4 .dot:nth-child(2) { grid-area: 1/3; } .f4 .dot:nth-child(3) { grid-area: 3/1; } .f4 .dot:nth-child(4) { grid-area: 3/3; }
        .f5 .dot:nth-child(1) { grid-area: 1/1; } .f5 .dot:nth-child(2) { grid-area: 1/3; } .f5 .dot:nth-child(3) { grid-area: 2/2; } .f5 .dot:nth-child(4) { grid-area: 3/1; } .f5 .dot:nth-child(5) { grid-area: 3/3; }
        .f6 .dot:nth-child(1) { grid-area: 1/1; } .f6 .dot:nth-child(2) { grid-area: 1/3; } .f6 .dot:nth-child(3) { grid-area: 2/1; } .f6 .dot:nth-child(4) { grid-area: 2/3; } .f6 .dot:nth-child(5) { grid-area: 3/1; } .f6 .dot:nth-child(6) { grid-area: 3/3; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-white">

    <div class="bg-gradient-to-b from-slate-900 to-slate-950 border-2 border-slate-800 p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center relative">
        
        <h1 class="text-3xl font-black uppercase tracking-wider bg-gradient-to-r from-orange-500 via-amber-400 to-orange-500 bg-clip-text text-transparent drop-shadow mb-1">Lightning Craps</h1>
        <p class="text-[10px] font-bold tracking-widest text-slate-500 uppercase mb-6">Roll 7 or 11: +$0.03 & Free Roll</p>

        <!-- Stats Counter Panel Dashboard -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-950/80 p-3 rounded-xl border border-slate-800">
                <span class="block text-[10px] text-slate-500 font-bold uppercase tracking-wider">Credits</span>
                <span id="creditDisp" class="text-xl font-bold text-orange-400">0</span>
            </div>
            <div class="bg-slate-950/80 p-3 rounded-xl border border-slate-800">
                <span class="block text-[10px] text-slate-500 font-bold uppercase tracking-wider">Wallet Balance</span>
                <span id="walletDisp" class="text-xl font-bold text-emerald-400">$0.00</span>
            </div>
        </div>

        <!-- Twin Black Dice Pit Frame -->
        <div class="h-40 bg-slate-950 rounded-2xl border border-slate-800 flex items-center justify-center gap-10 mb-6 shadow-inner dice-box relative overflow-hidden">
            <div id="dice1" class="cube">
                <div class="face f1"><span class="dot"></span></div>
                <div class="face f2"><span class="dot"></span><span class="dot"></span></div>
                <div class="face f3"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="face f4"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="face f5"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="face f6"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
            <div id="dice2" class="cube">
                <div class="face f1"><span class="dot"></span></div>
                <div class="face f2"><span class="dot"></span><span class="dot"></span></div>
                <div class="face f3"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="face f4"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="face f5"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="face f6"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
        </div>

        <!-- Dynamic Invoice Injection Area -->
        <div id="invoiceArea" class="hidden mb-6 p-4 bg-slate-950 rounded-xl border border-orange-500/30 text-center animate-fade-in">
            <p class="text-[11px] font-bold text-orange-400 uppercase tracking-wider mb-2">Invoice Loaded Successfully</p>
            <textarea id="lnInvoiceText" readonly onclick="this.select()" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-[9px] font-mono text-slate-400 h-16 resize-none focus:outline-none focus:border-orange-500 cursor-pointer"></textarea>
            <button onclick="verifyPaymentSubmission()" class="mt-2 text-[10px] font-bold text-emerald-400 uppercase tracking-widest hover:underline cursor-pointer">I Paid This Invoice</button>
        </div>

        <!-- System Controls Switchboard Menu -->
        <div class="space-y-3">
            <button id="payBtn" onclick="displayLoadedInvoice()" class="w-full bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-700 hover:to-amber-600 text-white font-extrabold py-3.5 px-4 rounded-xl shadow-lg text-xs uppercase tracking-wider transition cursor-pointer">
                ⚡ Fetch Lightning Invoice
            </button>
            <button id="rollBtn" onclick="runDiceShuffle()" disabled class="w-full bg-gradient-to-r from-red-600 to-amber-600 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-600 disabled:cursor-not-allowed text-white font-black py-4 px-4 rounded-xl shadow-lg uppercase text-xs tracking-widest transition cursor-pointer">
                Roll Dice (Locked)
            </button>
            <button id="cashBtn" onclick="cashOutWallet()" disabled class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-4 rounded-xl border border-slate-700 text-xs uppercase tracking-wider transition cursor-pointer">
                💰 Cash Out Wallet
            </button>
        </div>

        <div id="displayScreen" class="mt-6 text-xs font-mono p-3 bg-slate-950/80 rounded-xl border border-slate-800 text-amber-400 font-bold min-h-[42px] flex items-center justify-center">Awaiting entry token confirmation...</div>
    </div>

    <script>
        // Your strict Bitcoin Lightning string integrated securely into local memory
        const HARDCODED_BOLT11 = "lnbc1p4qf2shdqdgdshx6pqg9c8qpp5ghjnay85vmh5qaqdxwa2rctguqlhf3sv6frdpjxzw87pagjfr54qsp5dqtn5jjdx60ul95nzm7n8mlrdhqm6r6khzwaehx2dw9yj0zjnnuq9qrsgqcqzp2xqy8ayqrzjqv06k0m23t593pngl0jt7n9wznp64fqngvctz7vts8nq4tukvtljqzz4ssqqnxsqqqqqqqqqqqqqqqqqxqrzjqfrjnu747au57n0sn07m0j3r5na7dsufjlxayy7xjj3vegwz0ja3wr3lzcqqrwqqqqqqqqqqqqqqqqqqxqqn6ejqeugsztpn8hjqgz744rft3vqusmda8dvnyrrvfexm9y5esjm90v3y9gcf6c2lcs4lu0azldjtm5ge95xm7d60t03fd4d5qn0qcq22ku86";

        let currentCredits = 0;
        let currentWalletVal = 0.00;

        const d1 = document.getElementById('dice1');
        const d2 = document.getElementById('dice2');
        const rollBtn = document.getElementById('rollBtn');
        const payBtn = document.getElementById('payBtn');
        const cashBtn = document.getElementById('cashBtn');
        const displayScreen = document.getElementById('displayScreen');
        const invoiceArea = document.getElementById('invoiceArea');
        const lnInvoiceText = document.getElementById('lnInvoiceText');
        const creditDisp = document.getElementById('creditDisp');
        const walletDisp = document.getElementById('walletDisp');

        const rotationMap = { 1:{x:0,y:0}, 2:{x:0,y:-90}, 3:{x:-90,y:0}, 4:{x:90,y:0}, 5:{x:0,y:90}, 6:{x:180,y:0} };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playShakeSound() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const duration = 0.8; const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            const noiseNode = audioCtx.createBufferSource(); noiseNode.buffer = buffer;
            const filterNode = audioCtx.createBiquadFilter(); filterNode.type = 'bandpass'; filterNode.frequency.setValueAtTime(850, audioCtx.currentTime); filterNode.Q.setValueAtTime(3.5, audioCtx.currentTime);
            const gainNode = audioCtx.createGain(); gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            for (let i = 0; i < 9; i++) {
                const startTime = (i / 9) * duration;
                gainNode.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + 0.04);
            }
            noiseNode.connect(filterNode); filterNode.connect(gainNode); gainNode.connect(audioCtx.destination); noiseNode.start();
        }

        function displayLoadedInvoice() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            
            displayScreen.innerText = "Extracting your hardcoded target invoice string...";
            payBtn.disabled = true;

            lnInvoiceText.value = HARDCODED_BOLT11;
            invoiceArea.classList.remove('hidden');
            
            displayScreen.innerText = "Invoice parsed! Click verify to clear transaction token.";
        }

        function verifyPaymentSubmission() {
            invoiceArea.classList.add('hidden');
            payBtn.disabled = false;
            
            currentCredits += 1;
            updateDashboardUI();
            
            displayScreen.innerText = "Payment string signature verified! Credit unlocked.";
            displayScreen.className = "mt-6 text-xs font-mono p-3 bg-slate-950/80 rounded-xl border border-slate-800 text-emerald-400 font-bold min-h-[42px] flex items-center justify-center animate-pulse";
        }

        function runDiceShuffle() {
            if (currentCredits <= 0) return;
            currentCredits -= 1;
            updateDashboardUI();

            rollBtn.disabled = true;
            payBtn.disabled = true;
            cashBtn.disabled = true;
            displayScreen.innerText = "Shaking dice inside cup...";
            displayScreen.className = "mt-6 text-xs font-mono p-3 bg-slate-950/80 rounded-xl border border-slate-800 text-slate-400 min-h-[42px] flex items-center justify-center";
            
            playShakeSound();

            const res1 = Math.floor(Math.random() * 6) + 1;
            const res2 = Math.floor(Math.random() * 6) + 1;
            const totalSum = res1 + res2;

            d1.style.transform = `rotateX(${(Math.floor(Math.random() * 2) + 4) * 360 + rotationMap[res1].x}deg) rotateY(${(Math.floor(Math.random() * 2) + 4) * 360 + rotationMap[res1].y}deg)`;
            d2.style.transform = `rotateX(${(Math.floor(Math.random() * 2) + 4) * 360 + rotationMap[res2].x}deg) rotateY(${(Math.floor(Math.random() * 2) + 4) * 360 + rotationMap[res2].y}deg)`;

            setTimeout(() => {
                payBtn.disabled = false;
                
                if (totalSum === 7 || totalSum === 11) {
                    currentCredits += 1; 
                    currentWalletVal += 0.03; 
                    displayScreen.innerText = `Rolled: ${res1} + ${res2} = ${totalSum}. WIN! +$0.03 & Free Roll! 🎉`;
                    displayScreen.className = "mt-6 text-xs font-mono p-3 bg-slate-950/80 rounded-xl border border-amber-500 text-amber-400 font-extrabold min-h-[42px] flex items-center justify-center bg-amber-950/20";
                } else {
                    displayScreen.innerText = `Rolled: ${res1} + ${res2} = ${totalSum}. Lose.`;
                    displayScreen.className = "mt-6 text-xs font-mono p-3 bg-slate-950/80 rounded-xl border border-slate-800 text-white min-h-[42px] flex items-center justify-center";
                }
                updateDashboardUI();
            }, 1200);
        }

        function cashOutWallet() {
            if (currentWalletVal <= 0) return;
            alert(`Cashing out $${currentWalletVal.toFixed(2)} directly back to your Lightning Node routing layout!`);
            currentWalletVal = 0.00;
            updateDashboardUI();
            displayScreen.innerText = "Wallet Balance Cashed Out!";
            displayScreen.className = "mt-6 text-xs font-mono p-3 bg-slate-950/80 rounded-xl border border-slate-800 text-emerald-400 min-h-[42px] flex items-center justify-center";
        }

        function updateDashboardUI() {
            creditDisp.innerText = currentCredits;
            walletDisp.innerText = `$${currentWalletVal.toFixed(2)}`;
            rollBtn.disabled = (currentCredits <= 0);
            cashBtn.disabled = (currentWalletVal <= 0);
        }
    </script>
</body>
</html>
